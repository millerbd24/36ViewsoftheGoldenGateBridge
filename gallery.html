<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Series — 36 Views of the Golden Gate Bridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ivory: #f5f0e8;
      --charcoal: #1a1a1a;
      --warm-gray: #8a8078;
      --gold: #c9a84c;
      --black: #0f0f0f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: var(--black);
      color: var(--ivory);
      font-family: 'Montserrat', sans-serif;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(15,15,15,0.95), transparent);
      backdrop-filter: blur(4px);
    }

    .site-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1rem;
      color: var(--ivory);
      text-decoration: none;
    }

    .site-title em { font-style: italic; color: var(--gold); }

    nav { display: flex; gap: 2.5rem; }

    nav a {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.7);
      text-decoration: none;
      transition: color 0.3s;
    }

    nav a:hover, nav a.active { color: var(--gold); }

    .gallery { padding-top: 60px; }

    .photo-block {
      position: relative;
      width: 100%;
      cursor: pointer;
      display: block;
      line-height: 0;
      border-bottom: 4px solid var(--black);
    }

    .photo-block img {
      width: 100%;
      height: auto;
      display: block;
      transition: filter 0.4s ease;
    }

    .photo-block:hover img { filter: brightness(1.06); }

    .photo-num {
      position: absolute;
      bottom: 1.2rem;
      left: 1.5rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: rgba(245,240,232,0.6);
      text-shadow: 0 1px 8px rgba(0,0,0,0.9);
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }

    .photo-block:hover .photo-num { opacity: 1; transform: translateY(0); }

    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(8,8,8,0.98);
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #lightbox.open { display: flex; animation: lbFade 0.25s ease; }

    @keyframes lbFade { from { opacity: 0; } to { opacity: 1; } }

    #lightbox-img {
      max-width: 96vw;
      max-height: 90vh;
      object-fit: contain;
      display: block;
      animation: lbScale 0.3s ease;
    }

    @keyframes lbScale {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    .lb-caption {
      margin-top: 1rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: rgba(245,240,232,0.35);
      letter-spacing: 0.08em;
    }

    .lb-close {
      position: fixed;
      top: 1.2rem; right: 1.8rem;
      font-size: 1.6rem;
      color: rgba(245,240,232,0.4);
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      padding: 0.5rem;
      transition: color 0.2s;
    }

    .lb-close:hover { color: var(--gold); }

    .lb-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(245,240,232,0.35);
      font-size: 2.5rem;
      cursor: pointer;
      padding: 1.5rem;
      transition: color 0.2s;
      line-height: 1;
    }

    .lb-arrow:hover { color: var(--gold); }
    .lb-arrow.prev { left: 0.5rem; }
    .lb-arrow.next { right: 0.5rem; }

    .lb-counter {
      position: fixed;
      bottom: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: 0.6rem;
      letter-spacing: 0.45em;
      color: rgba(245,240,232,0.25);
    }

    footer {
      background: #0a0a0a;
      padding: 1.5rem;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(138,128,120,0.4);
      border-top: 1px solid rgba(201,168,76,0.1);
    }

    footer a { color: inherit; text-decoration: none; }
    footer a:hover { color: var(--gold); }
  </style>
</head>
<body>

  <header>
    <a class="site-title" href="index.html">36 Views of the <em>Golden Gate Bridge</em></a>
    <nav>
      <a href="gallery.html" class="active">The Series</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <div class="gallery" id="gallery"></div>

  <div id="lightbox">
    <button class="lb-close" id="lb-close">&#x2715;</button>
    <button class="lb-arrow prev" id="lb-prev">&#8592;</button>
    <img id="lightbox-img" src="" alt="">
    <p class="lb-caption" id="lb-caption"></p>
    <button class="lb-arrow next" id="lb-next">&#8594;</button>
    <p class="lb-counter" id="lb-counter"></p>
  </div>

  <footer>
    <a href="index.html">36 Views of the Golden Gate Bridge</a>
    &nbsp;·&nbsp;
    <a href="about.html">About</a>
    &nbsp;·&nbsp;
    <a href="contact.html">Contact</a>
  </footer>

  <script>
    const total = 36;
    const gallery = document.getElementById('gallery');
    let currentIndex = 0;

    for (let i = 1; i <= total; i++) {
      const block = document.createElement('div');
      block.className = 'photo-block';
      block.innerHTML = `
        <img src="photos/${i}.jpg" alt="View ${i} of 36" loading="lazy">
        <span class="photo-num">View ${i} of 36</span>
      `;
      block.addEventListener('click', () => openLightbox(i - 1));
      gallery.appendChild(block);
    }

    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const lbCaption = document.getElementById('lb-caption');
    const lbCounter = document.getElementById('lb-counter');

    function openLightbox(index) {
      currentIndex = index;
      updateLightbox();
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
    }

    function updateLightbox() {
      lbImg.src = `photos/${currentIndex + 1}.jpg`;
      lbImg.alt = `View ${currentIndex + 1} of 36`;
      lbCaption.textContent = `View ${currentIndex + 1} of 36`;
      lbCounter.textContent = `${currentIndex + 1} / ${total}`;
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + total) % total;
      lbImg.style.animation = 'none';
      lbImg.offsetHeight;
      lbImg.style.animation = '';
      updateLightbox();
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % total;
      lbImg.style.animation = 'none';
      lbImg.offsetHeight;
      lbImg.style.animation = '';
      updateLightbox();
    }

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', prevImage);
    document.getElementById('lb-next').addEventListener('click', nextImage);

    lb.addEventListener('click', (e) => { if (e.target === lb) closeLightbox(); });

    document.addEventListener('keydown', (e) => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'ArrowRight') nextImage();
    });
  </script>

</body>
</html>
