<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>36 Views of the Golden Gate Bridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ivory: #f5f0e8;
      --charcoal: #1a1a1a;
      --warm-gray: #8a8078;
      --gold: #c9a84c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--charcoal);
      color: var(--ivory);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-img {
      position: absolute;
      inset: 0;
      background: url('photos/2.jpg') center center / cover no-repeat;
      transform: scale(1.05);
      animation: slowZoom 20s ease-out forwards;
    }

    @keyframes slowZoom {
      from { transform: scale(1.05); }
      to   { transform: scale(1.0); }
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(20,18,16,0.15) 0%,
        rgba(20,18,16,0.35) 50%,
        rgba(20,18,16,0.60) 100%
      );
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 2rem;
      animation: fadeUp 1.8s ease forwards;
      opacity: 0;
      animation-delay: 0.3s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: clamp(0.6rem, 1.5vw, 0.8rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 7vw, 6rem);
      line-height: 1.05;
      letter-spacing: 0.02em;
      color: var(--ivory);
      margin-bottom: 0.4rem;
    }

    .hero-title em {
      font-style: italic;
      color: var(--gold);
    }

    .hero-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      color: rgba(245,240,232,0.7);
      margin-bottom: 3rem;
      letter-spacing: 0.05em;
    }

    .hero-rule {
      width: 60px;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 3rem;
    }

    nav {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      gap: clamp(2rem, 5vw, 5rem);
      animation: fadeUp 1.8s ease forwards;
      opacity: 0;
      animation-delay: 0.8s;
    }

    nav a {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(0.65rem, 1.4vw, 0.78rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--ivory);
      text-decoration: none;
      position: relative;
      padding-bottom: 6px;
      transition: color 0.3s;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width 0.4s ease;
    }

    nav a:hover { color: var(--gold); }
    nav a:hover::after { width: 100%; }

    footer {
      background: #111;
      padding: 1.5rem;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(138,128,120,0.5);
    }

    footer a { color: inherit; text-decoration: none; }
    footer a:hover { color: var(--gold); }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-img"></div>
    <div class="hero-overlay"></div>

    <div class="hero-content">
      <p class="hero-eyebrow">A Photographic Series by Brad Miller</p>
      <h1 class="hero-title">36 Views of the<br><em>Golden Gate Bridge</em></h1>
      <p class="hero-subtitle">Life beneath an American Icon</p>
      <div class="hero-rule"></div>

      <nav>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </section>

  <footer>
    <a href="index.html">36 Views of the Golden Gate Bridge</a>
    &nbsp;&nbsp;·&nbsp;&nbsp;
    <a href="gallery.html">Gallery</a>
    &nbsp;&nbsp;·&nbsp;&nbsp;
    <a href="about.html">About</a>
    &nbsp;&nbsp;·&nbsp;&nbsp;
    <a href="contact.html">Contact</a>
  </footer>

</body>
</html>
